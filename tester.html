<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker | Premium Prototype</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00FF88">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00FF88;
            --primary-glow: rgba(0, 255, 136, 0.3);
            --background: #0A0A0A;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-hover: rgba(255, 255, 255, 0.1);
            --error: #FF3B30;
            --on-surface: #F5F5F7;
            --on-surface-variant: #A1A1A6;
            --accent-purple: #BF5AF2;
            --accent-blue: #0A84FF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050505;
            color: var(--on-surface);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #050505 100%);
        }

        /* Phone Frame */
        .phone-frame {
            width: 390px;
            height: 844px;
            background: var(--background);
            border-radius: 50px;
            border: 12px solid #1c1c1e;
            overflow: hidden;
            position: relative;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        /* Mesh Gradient Background */
        .mesh-bg {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, #1c3d2e 0%, transparent 40%),
                        radial-gradient(circle at 70% 60%, #2e1c3d 0%, transparent 40%);
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            pointer-events: none;
        }

        header {
            padding: 60px 24px 10px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            z-index: 10;
            padding-bottom: 100px;
        }

        .content::-webkit-scrollbar { display: none; }

        /* Premium Cards */
        .glass-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:active { transform: scale(0.98); }

        .budget-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .budget-amount { font-size: 32px; font-weight: 700; color: var(--on-surface); }
        .budget-label { font-size: 14px; color: var(--on-surface-variant); margin-bottom: 4px; }

        .progress-bar-bg {
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 15px var(--primary-glow);
            width: 0%;
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Chart Section */
        .chart-box {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 40px 0;
            position: relative;
        }

        .donut-ring {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: conic-gradient(var(--primary) 0% 0%, #222 0% 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
            transition: background 1s ease;
        }

        .donut-hole {
            width: 160px;
            height: 160px;
            background: #0A0A0A;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Transaction List */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-card {
            display: flex;
            align-items: center;
            padding: 16px;
            background: var(--surface);
            border-radius: 20px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            animation: fadeInScale 0.5s ease-out backwards;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            margin-right: 16px;
        }

        .item-details { flex: 1; }
        .item-name { font-weight: 600; font-size: 16px; margin-bottom: 2px; }
        .item-meta { font-size: 12px; color: var(--on-surface-variant); }
        .item-price { font-weight: 700; font-size: 16px; color: var(--on-surface); }

        /* Navigation */
        .navbar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 72px;
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 36px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .nav-btn {
            width: 44px;
            height: 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 50%;
        }

        .nav-btn.active { color: var(--primary); background: rgba(0, 255, 136, 0.1); }
        .nav-btn i { font-size: 20px; margin-bottom: 2px; }

        /* Floating Add Button */
        .fab {
            width: 56px;
            height: 56px;
            background: var(--primary);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: black;
            font-size: 24px;
            font-weight: 700;
            box-shadow: 0 10px 20px var(--primary-glow);
            cursor: pointer;
            transition: transform 0.3s;
        }

        .fab:hover { transform: scale(1.1) rotate(90deg); }

        /* Modal */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: flex-end;
        }

        .modal-sheet {
            width: 100%;
            background: #1c1c1e;
            border-radius: 40px 40px 0 0;
            padding: 40px 24px 60px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 1, 0.2, 1);
        }

        .modal-sheet.open { transform: translateY(0); }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; color: var(--on-surface-variant); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select {
            width: 100%;
            padding: 18px;
            background: #2c2c2e;
            border: none;
            border-radius: 18px;
            color: white;
            font-size: 16px;
            font-weight: 500;
        }

        .save-btn {
            background: var(--primary);
            color: black;
            padding: 20px;
            border-radius: 18px;
            text-align: center;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="mesh-bg"></div>
    
    <header>
        <h1 id="view-title">Dashboard</h1>
        <div style="display: flex; gap: 12px;">
            <a href="https://discord.gg/Uz8hj5EdEp" target="_blank" style="text-decoration: none; width: 40px; height: 40px; background: rgba(88, 101, 242, 0.2); border-radius: 12px; display: flex; justify-content: center; align-items: center; border: 1px solid rgba(88, 101, 242, 0.4);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037 19.736 19.736 0 0 0-4.885 1.515.069.069 0 0 0-.032.027C.533 9.048-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
            </a>
            <div style="width: 40px; height: 40px; background: var(--surface); border-radius: 12px; display: flex; justify-content: center; align-items: center;">👤</div>
        </div>
    </header>
    
    <div class="content" id="scroll-content">
        <!-- Dashboard -->
        <div id="view-dashboard">
            <div class="glass-card">
                <div class="budget-header">
                    <div>
                        <div class="budget-label">Total Spending</div>
                        <div class="budget-amount" id="balance-text">$0.00</div>
                    </div>
                    <div style="font-size: 12px; color: var(--primary); font-weight: 600; padding: 6px 12px; background: rgba(0,255,136,0.1); border-radius: 100px;">Monthly</div>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-fill" id="main-progress"></div>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 14px; color: var(--on-surface-variant);">
                    <span id="spent-text">$0.00 spent</span>
                    <span>Limit: $1000</span>
                </div>
            </div>

            <div class="chart-box">
                <div class="donut-ring" id="main-donut">
                    <div class="donut-hole">
                        <span style="font-size: 14px; color: var(--on-surface-variant);">Overview</span>
                        <span id="chart-sum" style="font-size: 28px; font-weight: 700;">$0</span>
                    </div>
                </div>
            </div>

            <div class="section-title">
                <span>Transactions</span>
                <span style="font-size: 12px; color: var(--primary); cursor: pointer;" onclick="showScreen('list')">View All</span>
            </div>
            <div id="dash-list"></div>

            <div style="margin-top: 40px; padding: 20px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05);">
                <div style="font-size: 12px; color: var(--on-surface-variant); margin-bottom: 8px;">Proudly presented by</div>
                <a href="https://discord.gg/Uz8hj5EdEp" target="_blank" style="color: #5865F2; text-decoration: none; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037 19.736 19.736 0 0 0-4.885 1.515.069.069 0 0 0-.032.027C.533 9.048-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                    Join our Discord
                </a>
            </div>
        </div>

        <!-- Full List View -->
        <div id="view-list" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span style="color: var(--on-surface-variant); font-size: 14px;">Transaction History</span>
                <div class="save-btn" style="margin: 0; padding: 8px 16px; font-size: 12px; border-radius: 100px;" onclick="downloadCSV()">Export CSV</div>
            </div>
            <div id="full-history-list"></div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="navbar">
        <div class="nav-btn active" onclick="showScreen('dashboard')">
            <span style="font-size: 20px;">🏠</span>
            <span style="font-size: 10px;">Home</span>
        </div>
        
        <div class="fab" onclick="toggleModal(true)">+</div>

        <div class="nav-btn" onclick="showScreen('list')">
            <span style="font-size: 20px;">📜</span>
            <span style="font-size: 10px;">History</span>
        </div>
    </div>

    <!-- Add Modal -->
    <div class="modal-overlay" id="modal-overlay" onclick="if(event.target == this) toggleModal(false)">
        <div class="modal-sheet" id="modal-sheet">
            <div style="width: 40px; height: 5px; background: #3a3a3c; border-radius: 100px; margin: -20px auto 30px;"></div>
            <h2 style="margin-bottom: 24px; font-size: 24px;">Add Transaction</h2>
            
            <div style="display: flex; background: #2c2c2e; padding: 4px; border-radius: 14px; margin-bottom: 24px;">
                <div id="type-expense" class="save-btn" style="flex: 1; margin: 0; padding: 12px; background: var(--primary); color: black;" onclick="setType('expense')">Expense</div>
                <div id="type-income" class="save-btn" style="flex: 1; margin: 0; padding: 12px; background: transparent; color: white;" onclick="setType('income')">Income</div>
            </div>

            <div class="input-group">
                <label>Amount</label>
                <input type="number" id="in-amount" placeholder="0.00" step="0.01">
            </div>
            
            <div class="input-group">
                <label>Category</label>
                <select id="in-cat">
                    <option value="Food">🍔 Food & Dining</option>
                    <option value="Transport">🚗 Transport</option>
                    <option value="Shopping">🛍️ Shopping</option>
                    <option value="Bills">📄 Monthly Bills</option>
                    <option value="Salary">💰 Salary / Income</option>
                    <option value="Other">📦 Miscellaneous</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Note</label>
                <input type="text" id="in-note" placeholder="What was this for?">
            </div>
            
            <div class="save-btn" id="save-btn" onclick="handleSave()">Complete Expense</div>
        </div>
    </div>
</div>

<script>
    let expenses = JSON.parse(localStorage.getItem('expenses_v3')) || [];
    let currentType = 'expense';

    const icons = {
        'Food': '🍔',
        'Transport': '🚗',
        'Shopping': '🛍️',
        'Bills': '📄',
        'Salary': '💰',
        'Other': '📦'
    };

    function setType(type) {
        currentType = type;
        document.getElementById('type-expense').style.background = type === 'expense' ? 'var(--primary)' : 'transparent';
        document.getElementById('type-expense').style.color = type === 'expense' ? 'black' : 'white';
        document.getElementById('type-income').style.background = type === 'income' ? 'var(--primary)' : 'transparent';
        document.getElementById('type-income').style.color = type === 'income' ? 'black' : 'white';
        document.getElementById('save-btn').innerText = `Complete ${type === 'expense' ? 'Expense' : 'Income'}`;
        document.getElementById('save-btn').style.background = type === 'income' ? '#0A84FF' : 'var(--primary)';
        if (type === 'income') document.getElementById('in-cat').value = 'Salary';
    }

    function handleSave() {
        const amt = parseFloat(document.getElementById('in-amount').value);
        const cat = document.getElementById('in-cat').value;
        const note = document.getElementById('in-note').value;

        if (!amt || amt <= 0) return;

        const entry = {
            id: Date.now(),
            amount: amt,
            type: currentType,
            category: cat,
            note: note,
            date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
        };

        expenses.unshift(entry);
        localStorage.setItem('expenses_v3', JSON.stringify(expenses));
        
        document.getElementById('in-amount').value = '';
        document.getElementById('in-note').value = '';
        toggleModal(false);
        refreshUI();
    }

    function refreshUI() {
        const totalIncome = expenses.filter(e => e.type === 'income').reduce((sum, e) => sum + e.amount, 0);
        const totalExpense = expenses.filter(e => e.type === 'expense').reduce((sum, e) => sum + e.amount, 0);
        const balance = totalIncome - totalExpense;

        // Update Text
        document.getElementById('balance-text').innerText = `$${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById('view-title').innerText = "Balance";
        document.getElementById('spent-text').innerText = `In: $${totalIncome.toFixed(0)} | Out: $${totalExpense.toFixed(0)}`;
        document.getElementById('chart-sum').innerText = `$${balance.toFixed(0)}`;

        // Update Bars
        const progress = totalIncome > 0 ? Math.min((totalExpense / totalIncome) * 100, 100) : 0;
        document.getElementById('main-progress').style.width = progress + '%';
        const donut = document.getElementById('main-donut');
        donut.style.background = `conic-gradient(var(--primary) 0% ${100-progress}%, var(--error) ${100-progress}% 100%)`;

        // Render Lists
        const renderItem = (e, i) => `
            <div class="item-card" style="animation-delay: ${i * 0.05}s">
                <div class="icon-box" style="background: ${e.type === 'income' ? 'rgba(10, 132, 255, 0.1)' : 'rgba(255, 255, 255, 0.05)'}">${icons[e.category] || '💰'}</div>
                <div class="item-details">
                    <div class="item-name">${e.category}</div>
                    <div class="item-meta">${e.note || (e.type === 'income' ? 'Inward Transfer' : 'Expense')} • ${e.date}</div>
                </div>
                <div class="item-price" style="color: ${e.type === 'income' ? '#0A84FF' : 'var(--on-surface)'}">${e.type === 'income' ? '+' : '-'}$${e.amount.toFixed(2)}</div>
            </div>
        `;

        document.getElementById('dash-list').innerHTML = expenses.slice(0, 4).map(renderItem).join('');
        document.getElementById('full-history-list').innerHTML = expenses.map(renderItem).join('');
    }

    function showScreen(name) {
        document.getElementById('view-dashboard').style.display = name === 'dashboard' ? 'block' : 'none';
        document.getElementById('view-list').style.display = name === 'list' ? 'block' : 'none';
        document.getElementById('view-title').innerText = name === 'dashboard' ? 'Dashboard' : 'History';
        
        document.querySelectorAll('.nav-btn').forEach((b, i) => {
            b.classList.toggle('active', (name === 'dashboard' && i === 0) || (name === 'list' && i === 1));
        });
        
        // Scroll to top
        document.getElementById('scroll-content').scrollTop = 0;
    }

    function toggleModal(show) {
        const overlay = document.getElementById('modal-overlay');
        const sheet = document.getElementById('modal-sheet');
        if (show) {
            overlay.style.display = 'flex';
            setTimeout(() => sheet.classList.add('open'), 10);
        } else {
            sheet.classList.remove('open');
            setTimeout(() => overlay.style.display = 'none', 400);
        }
    }

    function downloadCSV() {
        if (expenses.length === 0) return alert("No data to export");
        
        let csv = "Date,Category,Amount,Note\n";
        expenses.forEach(e => {
            csv += `${e.date},${e.category},${e.amount},"${e.note || ''}"\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('hidden', '');
        a.setAttribute('href', url);
        a.setAttribute('download', 'expenses.csv');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    refreshUI();

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker Registered'));
    }
</script>

</body>
</html>
